<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Noise</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Theme segmented control — top right -->
  <div id="theme-segment">
    <button class="segment-btn active" data-theme="dark">Dark</button>
    <button class="segment-btn" data-theme="light">Light</button>
  </div>

  <div id="controls">

    <!-- FORMATION -->
    <span class="section-label first">Formation</span>
    <div id="shape-section">
      <div class="card-grid two-col">
        <button class="shape-card active" data-value="circle">○<span>Circle</span></button>
        <button class="shape-card" data-value="triangle">△<span>Triangle</span></button>
        <button class="shape-card" data-value="freeform">✦<span>Freeform</span></button>
        <button class="shape-card" data-value="wave">∿<span>Wave</span></button>
        <button class="shape-card" data-value="harmonic">ψ<span>Harmonic</span></button>
        <button class="shape-card" data-value="lissajous">∞<span>Lissajous</span></button>
        <button class="shape-card" data-value="murmuration">⬬<span>Murmuration</span></button>
        <button class="shape-card" data-value="hopf">⊙<span>Hopf</span></button>
      </div>
    </div>

    <!-- WAVE -->
    <span class="section-label">Wave</span>
    <div class="control-group">
      <label for="frequency">Freq</label>
      <input type="range" id="frequency" min="1" max="8" value="3" step="1" />
      <span class="value-display" id="frequency-val">3</span>
    </div>
    <div class="control-group">
      <label for="wave-speed">W.Speed</label>
      <input type="range" id="wave-speed" min="0" max="100" value="40" step="1" />
      <span class="value-display" id="wave-speed-val">40</span>
    </div>

    <!-- FLOCK (only shown when murmuration is active) -->
    <div id="flock-section" style="display:none; flex-direction:column; gap:8px;">
      <span class="section-label" style="border-top:1px solid rgba(255,255,255,0.07); padding-top:8px; margin-top:4px;">Flock</span>
      <div class="card-grid three-col">
        <button class="flock-card active" data-value="off">— <span>Off</span></button>
        <button class="flock-card" data-value="wave">∿ <span>Wave</span></button>
        <button class="flock-card" data-value="lissajous">∞ <span>Lissajous</span></button>
      </div>
    </div>

    <!-- PHYSICS -->
    <span class="section-label">Physics</span>
    <div class="control-group">
      <label for="tightness">Tightness</label>
      <input type="range" id="tightness" min="0" max="100" value="65" step="1" />
      <span class="value-display" id="tightness-val">65</span>
    </div>
    <div class="control-group">
      <label for="motion">Motion</label>
      <input type="range" id="motion" min="0" max="100" value="35" step="1" />
      <span class="value-display" id="motion-val">35</span>
    </div>
    <div class="control-group">
      <label for="cursor-strength">Cursor</label>
      <input type="range" id="cursor-strength" min="0" max="300" value="100" step="5" />
      <span class="value-display" id="cursor-strength-val">100</span>
    </div>

    <!-- PARTICLES -->
    <span class="section-label">Particles</span>
    <div class="control-group">
      <label for="count">Count</label>
      <input type="range" id="count" min="50" max="3000" value="1600" step="50" />
      <span class="value-display" id="count-val">1600</span>
    </div>
    <div class="control-group">
      <label for="scale">Scale</label>
      <input type="range" id="scale" min="1" max="100" value="30" step="1" />
      <span class="value-display" id="scale-val">30</span>
    </div>
    <div class="control-group">
      <label for="speed">Speed</label>
      <input type="range" id="speed" min="0" max="100" value="20" step="1" />
      <span class="value-display" id="speed-val">20</span>
    </div>
    <div class="control-group">
      <label for="trail">Trail</label>
      <input type="range" id="trail" min="0" max="100" value="0" step="1" />
      <span class="value-display" id="trail-val">0</span>
    </div>

    <button id="save-btn">Save PNG</button>
  </div>

  <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visual Noise</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="controls">
    <div class="shape-row">
      <button class="shape-card" data-value="wave">∿</button>
      <button class="shape-card" data-value="lissajous">∞</button>
      <button class="shape-card active" data-value="murmuration">⬬</button>
    </div>

    <div class="ctrl-divider"></div>

    <div class="control-group">
      <label for="frequency">Freq</label>
      <div class="control-group-inner">
        <input type="range" id="frequency" min="1" max="8" value="3" step="1" />
        <span class="value-display" id="frequency-val">3</span>
      </div>
    </div>
    <div class="control-group">
      <label for="wave-speed">W.Speed</label>
      <div class="control-group-inner">
        <input type="range" id="wave-speed" min="0" max="100" value="40" step="1" />
        <span class="value-display" id="wave-speed-val">40</span>
      </div>
    </div>
    <div class="control-group">
      <label for="tightness">Tightness</label>
      <div class="control-group-inner">
        <input type="range" id="tightness" min="0" max="100" value="65" step="1" />
        <span class="value-display" id="tightness-val">65</span>
      </div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
